<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | XINITY WebX Challenge</title>
    
    <!-- Modern Futuristic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Link to custom stylesheets -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navigation Overlay -->
    <nav class="glass-nav">
        <div class="logo-container">
            <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 15px;">
                <div style="font-family: var(--font-heading); color: var(--text-primary); font-size: 1.5rem; font-weight: bold; letter-spacing: -1px;">
                    <span style="color: var(--neon-secondary);">XINITY</span> HQ
                </div>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="nav-link">Back to Home</a></li>
        </ul>
    </nav>

    <main style="display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px;">
        <!-- Login Terminal Section -->
        <section id="login" class="section login-section" style="width: 100%; max-width: 600px; padding: 0;">
            <div class="glass-terminal">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <div class="terminal-title">Verification Portal</div>
                </div>
                
                <div class="terminal-body" style="padding: 40px 30px;">
                    <h2 class="glitch-title" style="font-size: 2.2rem; margin-bottom: 5px;">MEMBER LOGIN</h2>
                    <p style="margin-bottom: 30px; color: var(--text-secondary);">Verify your identity to access the community dashboard.</p>
                    
                    <form id="loginFormPage" class="cyber-form">
                        <div class="input-group">
                            <label for="loginIdentifier">Email / Registration ID</label>
                            <input type="text" id="loginIdentifier" required placeholder="Enter your registered email">
                        </div>
                        
                        <div class="input-group" style="margin-bottom: 35px;">
                            <label for="loginPass">Passcode</label>
                            <input type="password" id="loginPass" required placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn-submit" style="border-color: var(--neon-primary);">
                            <span style="text-shadow: 0 0 10px var(--neon-primary);">INITIALIZE LOGIN</span>
                            <div class="btn-backdrop" style="background: var(--neon-primary);"></div>
                        </button>
                    </form>
                    <div id="loginError" style="display: none; color: #ff3366; margin-top: 1rem; text-align: center; font-family: 'Space Grotesk', sans-serif;">
                        [Verification Failed: Invalid Credentials]
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginFormPage = document.getElementById('loginFormPage');
            if (loginFormPage) {
                loginFormPage.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const btn = loginFormPage.querySelector('.btn-submit');
                    const errorBox = document.getElementById('loginError');
                    const originalHTML = btn.innerHTML;
                    
                    btn.innerHTML = '<span style="text-shadow: 0 0 10px var(--neon-primary);">VERIFYING IDENTITY...</span><div class="btn-backdrop" style="background: var(--neon-primary); left:0"></div>';
                    errorBox.style.display = 'none';
                    
                    const payload = {
                        email: document.getElementById('loginIdentifier').value,
                        passcode: document.getElementById('loginPass').value
                    };

                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        const data = await response.json();

                        if (response.ok && data.success) {
                            window.location.href = data.redirect || '/dashboard.html';
                        } else {
                            errorBox.innerText = '[Verification Failed: ' + data.message + ']';
                            errorBox.style.display = 'block';
                            btn.innerHTML = originalHTML;
                        }
                    } catch (err) {
                        errorBox.innerText = '[Critical Error: Database Connection Failed]';
                        errorBox.style.display = 'block';
                        btn.innerHTML = originalHTML;
                    }
                });
            }
        });
    </script>
</body>
</html>
